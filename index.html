<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FASCO - Fashion E-commerce</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&family=Volkhov&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

    <header class="main-header">
        <div class="header-container">
            <a href="index.html" class="logo">FASCO</a>

            <nav class="nav-menu">
                <a href="index.html" class="nav-link active">Home</a>
                <a href="#" class="nav-link">Deals</a>
                <a href="#" class="nav-link">New Arrivals</a>
                <a href="#" class="nav-link">Packages</a>
                <a href="#" class="nav-link">Sign in</a>
            </nav>

            <button class="btn-signup">Sign Up</button>
        </div>
    </header>

    <section class="hero-section">
        <div class="hero-container">
            
            <div class="hero-left-block">
                <img src="assets/images/hero-left-man.png" alt="Fashion Man" class="hero-img-left">
            </div>

            <div class="hero-center-block">
                <div class="center-img-top-bg">
                    <img src="assets/images/hero-center-women.png" alt="4 Women Collection" class="center-img-top">
                </div>
                
                <div class="hero-text-wrapper">
                    <h2 class="text-ultimate">ULTIMATE</h2>
                    <h2 class="text-sale">SALE</h2>
                    <p class="text-new-collection">NEW COLLECTION</p>
                    <button class="btn-shop-now">SHOP NOW</button>
                </div>
                
                <div class="center-img-bottom-bg">
                    <img src="assets/images/hero-center-dresses.jpg" alt="2 Women Dresses" class="center-img-bottom">
                </div>
            </div>

            <div class="hero-right-block">
                <img src="assets/images/hero-right-man.png" alt="Fashion Man Right" class="hero-img-right">
            </div>
        </div>
    </section>

    <section class="brands-section">
        <div class="brands-container">
            <img src="assets/images/brand-chanel.png" alt="Chanel" class="brand-img brand-chanel">
            <img src="assets/images/brand-lv.png" alt="Louis Vuitton" class="brand-img brand-lv">
            <img src="assets/images/brand-prada.png" alt="Prada" class="brand-img brand-prada">
            <img src="assets/images/brand-ck.png" alt="Calvin Klein" class="brand-img brand-ck">
            <img src="assets/images/brand-denim.png" alt="Denim" class="brand-img brand-denim">
        </div>
    </section>

    <div class="floating-buttons">
        <button class="float-btn cart-btn" aria-label="Кошик">
            <img src="assets/images/icons/cart.svg" alt="Кошик">
        </button>
        <button class="float-btn top-btn">
            <img src="assets/images/icons/arrow-up.svg" alt="Стрілка вгору">
        </button>
    </div>
</body>
</html>
